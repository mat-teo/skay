services:
  db:
    image: postgres:15-alpine
    container_name: skay-db
    platform: linux/amd64 
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skay_user -d skay"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: skay-backend
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./backend:/app
      - ./backend/backups:/app/backups
      - ./backend/logs:/var/log

  frontend:
    build: ./frontend
    container_name: skay-frontend
    env_file:
      - ./frontend/.env.production
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure 

volumes:
  postgres_data: